services:
  backend:
    pull_policy: build
    build: ./backend
    image: backend
    container_name: backend
    ports:
      - "${BACKEND_PORT}:3000"
    volumes:
      - fastify_data:/app/database
      - ./backend/srcs/public:/app/public
    env_file:
      - ./backend/.env
    networks:
      - ft_transcendence
    restart: always
    init: true
    tty: true

  frontend:
    container_name: vite-dev
    build: ./frontend
    image: frontend-dev
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - backend
    networks:
      - ft_transcendence
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always
    init: true

volumes:
  fastify_data:
    name: fastify_data
    driver: local
    driver_opts:
      device: ${DATA_PATH}
      o: bind
      type: none


networks:
  ft_transcendence:
    driver: bridge
